<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parser Turni ACTV v2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --primary: #00796b; --primary-dark: #004d40; --bg: #eef2f5; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 15px; background: var(--bg); margin: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); text-align: center; border-bottom: 3px solid #b2dfdb; padding-bottom: 10px; font-size: 1.8rem; }
        
        .upload-section { 
            display: grid; 
            grid-template-columns: 1fr; 
            max-width: 500px;
            margin: 20px auto; 
        }
        
        .box { 
            border: 2px dashed var(--primary); 
            padding: 25px 15px; 
            border-radius: 10px; 
            text-align: center; 
            background: #fafcfc; 
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        .box.drag-over { background: #e0f2f1; border-color: var(--primary-dark); transform: scale(1.02); }
        .box label { cursor: pointer; display: block; font-weight: 600; margin-bottom: 10px; color: var(--primary-dark); }
        .box input { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        .file-name { display: block; margin-top: 10px; font-size: 0.85rem; color: #666; font-style: italic; }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 1.1rem; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background: var(--primary-dark); }
        button:active { transform: translateY(1px); }

        #log { 
            margin-top: 20px; 
            padding: 15px; 
            background: #263238; 
            color: #80cbc4; 
            border-radius: 8px; 
            font-family: 'Courier New', monospace; 
            font-size: 0.85rem; 
            height: 300px; 
            overflow-y: auto; 
            border: 1px solid #10191d;
        }
        .progress { height: 8px; background: #eceff1; border-radius: 4px; margin-bottom: 15px; overflow: hidden; display: none; }
        #bar { height: 100%; background: #26a69a; width: 0%; transition: 0.2s; }
        
        .stat-box { 
            display: flex; 
            flex-wrap: wrap;
            justify-content: space-around; 
            margin-top: 15px; 
            gap: 10px;
            font-weight: bold; 
            color: var(--primary-dark); 
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.4rem; }
            .box { padding: 20px 10px; }
            button { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Parser Turni ACTV v2.0</h1>
    
    <div class="upload-section">
        <div class="box" id="drop-zone-pdf">
            <label>Carica <b>PDF Turni ACTV</b></label>
            <span class="file-name" id="name-pdf">Nessun file selezionato</span>
            <input type="file" id="pdfFile" accept="application/pdf">
        </div>
    </div>

    <div class="progress" id="pDiv"><div id="bar"></div></div>
    <button id="startBtn">Avvia Estrazione Globale</button>
    
    <div class="stat-box">
        <span id="statTrovati">Codici Generati: 0</span>
    </div>
    
    <div id="log">Trascina il PDF o clicca sul riquadro per iniziare.</div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    // Gestione visuale Drag and Drop e nomi file
    function setupDropZone(inputId, zoneId, nameId) {
        const input = document.getElementById(inputId);
        const zone = document.getElementById(zoneId);
        const nameLabel = document.getElementById(nameId);

        input.addEventListener('change', () => {
            if(input.files[0]) nameLabel.innerText = input.files[0].name;
        });

        ['dragover', 'dragenter'].forEach(evt => {
            zone.addEventListener(evt, (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
        });
        ['dragleave', 'dragend', 'drop'].forEach(evt => {
            zone.addEventListener(evt, () => zone.classList.remove('drag-over'));
        });
    }

    setupDropZone('pdfFile', 'drop-zone-pdf', 'name-pdf');

    function addLog(msg, color = "#80cbc4") {
        const l = document.getElementById('log');
        const div = document.createElement('div');
        div.style.color = color;
        div.innerText = "> " + msg;
        l.appendChild(div);
        l.scrollTop = l.scrollHeight;
    }

    function pulisciLuogo(t) {
        if(!t) return "";
        return t.replace(/MONTA|SMONTA|alle|DURATA|Servizio|Validità|Tipologia|INTERO|PICCOLE|GRANDI|SPEZZATO|NOTTURNO|UNITA'|Nota|Indennità|[\d]{1,2}\.[\d]{2}|[:.\-_]{2,}/gi, "")
                .replace(/\s+/g, ' ').trim();
    }

    // Funzione centrale per generare i codici multipli in base alla Linea e Turno estratti
    function generaCodiciMansione(lineaPDF, turnoPDF) {
        const l = lineaPDF.toUpperCase().replace(/\s+/g, '');
        const numTurno = parseInt(turnoPDF, 10);
        
        // Format turno a due cifre (es: 01, 05, 12)
        const strT = numTurno.toString().padStart(2, '0');
        // Format turno + 50 a due cifre
        const strT50 = (numTurno + 50).toString().padStart(2, '0');

        let codici = [];

        // Linee Gruppo 1
        if (l === "1" || l === "L1") codici.push("1C" + strT, "1B" + strT);
        else if (l === "2" || l === "L2") codici.push("2C" + strT, "2B" + strT);
        else if (l === "3" || l === "L3") codici.push("3P" + strT, "3B" + strT);
        else if (l === "4.1" || l === "4.2" || l === "4") codici.push("4P" + strT, "4B" + strT);
        else if (l === "5.1" || l === "5.2" || l === "5") codici.push("5P" + strT, "5B" + strT);
        else if (l === "6" || l === "L6") codici.push("6P" + strT, "6B" + strT);
        else if (l === "7" || l === "L7") codici.push("7P" + strT, "7B" + strT);
        else if (l === "8" || l === "L8") codici.push("8P" + strT, "8B" + strT);
        
        // Linee Gruppo 2 (e casi speciali)
        else if (l === "PO") codici.push("PO" + strT); // Eccezione con un solo codice
        else if (["11", "12", "13", "14", "17", "M1", "M2", "M3", "PT", "AG", "AD", "PR", "AT", "AF", "AC"].includes(l)) {
            codici.push(l + strT, l + strT50);
        }

        return codici;
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
        const pdfFile = document.getElementById('pdfFile').files[0];
        if(!pdfFile) return alert("Per favore, carica il file PDF dei turni!");

        document.getElementById('pDiv').style.display = "block";
        document.getElementById('log').innerHTML = "";
        
        addLog("Inizio scansione globale del PDF...");

        const arrayBuffer = await pdfFile.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        let dbTurni = {};
        let trovatiCount = 0;

        for (let i = 1; i <= pdf.numPages; i++) {
            document.getElementById('bar').style.width = (i/pdf.numPages*100) + "%";
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const cleanText = content.items.map(item => item.str).join(" ").replace(/\s+/g, " ");

            // La magia del multi-blocco: dividiamo la pagina per la parola TURNO
            const turniNellaPagina = cleanText.split(/TURNO[:\s]+/i);

            for (let b = 1; b < turniNellaPagina.length; b++) {
                const bloccoTurno = turniNellaPagina[b];
                
                // Estrae il numero del turno
                const numMatch = bloccoTurno.match(/^(\d+)/);
                if (!numMatch) continue;
                const pdfT = parseInt(numMatch[1], 10).toString();

                // Estrae la linea
                let pdfL = "";
                const linMatch = bloccoTurno.match(/LINEA[:\s]+([A-Z0-9.]+)/i);
                if (linMatch) {
                    pdfL = linMatch[1].trim();
                } else {
                    const globalLinMatch = cleanText.match(/Linea[:\s]+([A-Z0-9.]+)/i);
                    if (globalLinMatch) pdfL = globalLinMatch[1].trim();
                }

                if (pdfL && pdfT) {
                    // Ottiene i codici differenziati per Pilota e Marinaio
                    const codiciDaGenerare = generaCodiciMansione(pdfL, pdfT);

                    if (codiciDaGenerare.length > 0) {
                        const headerArea = bloccoTurno.split(/(?:Nota servizio|EQUIPAGGIO|LIN\s+TV)/i)[0];
                        const pairRegex = /([A-Z.\s'\/]{3,})\s+(\d{1,2}\.\d{2})/g;
                        let matches = [];
                        let m;
                        while ((m = pairRegex.exec(headerArea)) !== null) {
                            matches.push({ luogo: pulisciLuogo(m[1]), ora: m[2] });
                        }

                        if (matches.length >= 2) {
                            const start = matches[0];
                            const end = matches[matches.length - 1];

                            codiciDaGenerare.forEach(codice => {
                                if (!dbTurni[codice]) {
                                    dbTurni[codice] = {
                                        inizio: start.ora.replace('.', ':'),
                                        luogoInizio: start.luogo,
                                        fine: end.ora.replace('.', ':'),
                                        luogoFine: end.luogo
                                    };
                                    trovatiCount++;
                                    document.getElementById('statTrovati').innerText = "Codici Generati: " + trovatiCount;
                                    addLog("CREATO: " + codice + " (Trovato: L." + pdfL + " T." + pdfT + ")", "#00e676");
                                }
                            });
                        }
                    }
                }
            }
        }

        if (Object.keys(dbTurni).length > 0) {
            const blob = new Blob([JSON.stringify(dbTurni, null, 2)], { type: "application/json" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "info_turni_actv_completo.json";
            a.click();
            addLog("\nFINE! Creato database con " + trovatiCount + " codici.", "#18ffff");
        } else {
            addLog("\nNESSUN TURNO TROVATO: Assicurati che il formato del PDF sia corretto.", "#ff5252");
        }
    });
</script>
</body>
</html>
